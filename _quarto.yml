project:
  type: default
  output-dir: published

date-format: "MMMM D, YYYY"

format:
  pdf:
    pdf-engine: lualatex
    documentclass: scrartcl
    linestretch: 1.06
    classoption:
      - titlepage
      - parskip=half
      - twoside
    mainfont: "Source Serif 4"

    include-in-header:
      text: |

        % ============================================================
        % TITLE PAGE SUPPRESSION
        % ============================================================
        \makeatletter
        \renewcommand{\maketitle}{} % suppress auto title page (custom one built in include-before-body)
        \makeatother

        % ============================================================
        % BRAND COLORS
        % ============================================================
        \usepackage{xcolor}
        \definecolor{PrimaryColor}{HTML}{1E3A5F}   % Deep navy
        \definecolor{SecondaryColor}{HTML}{4A5568} % Warm slate

        % Accessible heading color progression
        \definecolor{Heading1}{HTML}{1E3A5F}   % Deep navy
        \definecolor{Heading2}{HTML}{1B6CA8}   % Steel blue
        \definecolor{Heading3}{HTML}{0D9488}   % Teal
        \definecolor{Heading4}{HTML}{2D6A4F}   % Deep green

        % ============================================================
        % PDF METADATA AND HYPERLINKS
        % ============================================================
        \usepackage{hyperref}
        \hypersetup{
            pdfauthor={Joshua L. Moermond},
            pdftitle={Building an Assessment-Ready Conduct Data Model},
            pdfsubject={Student Conduct Data Analytics and Assessment},
            pdfkeywords={student conduct, Maxient, data modeling, Power BI, assessment, star schema, higher education},
            pdfcreator={Quarto with R 4.5.3 in R Studio},
            pdflang={en-US},
            pdfdisplaydoctitle=true
        }

        % ============================================================
        % FONTS
        % ============================================================

        % Body font: Source Serif 4 (serif, for readability in long-form prose)
        \usepackage{fontspec}
        \setmainfont{Source Serif 4}[
          UprightFont    = SourceSerif4-Regular.ttf,
          BoldFont       = SourceSerif4-Bold.ttf,
          ItalicFont     = SourceSerif4-Italic.ttf,
          BoldItalicFont = SourceSerif4-BoldItalic.ttf
        ]

        % Heading font: Source Sans 3 (sans-serif, for visual contrast with body)
        \newfontfamily\SansFont[
          UprightFont    = SourceSans3-Regular.ttf,
          BoldFont       = SourceSans3-Bold.ttf,
          ItalicFont     = SourceSans3-Italic.ttf,
          BoldItalicFont = SourceSans3-BoldItalic.ttf
        ]{Source Sans 3}

        \newfontfamily\SansFontLight[
          UprightFont = SourceSans3-Light.ttf,
          ItalicFont  = SourceSans3-LightItalic.ttf
        ]{Source Sans 3}

        \newcommand{\SansFontBold}{\SansFont\bfseries}

        % Monospace font for code blocks
        \setmonofont{Courier New}[Scale=0.75]

        % Emoji support with fallback
        \usepackage{emoji}
        \setemojifont{Segoe UI Emoji}[Renderer=HarfBuzz]
        \directlua{
          luaotfload.add_fallback("emojifallback", {"Segoe UI Emoji:mode=harf"})
        }

        % Re-declare main font with emoji fallback attached
        % (must come after emoji setup to apply the fallback correctly)
        \setmainfont{Source Serif 4}[
          BoldFont       = SourceSerif4-Bold.ttf,
          ItalicFont     = SourceSerif4-Italic.ttf,
          BoldItalicFont = SourceSerif4-BoldItalic.ttf,
          RawFeature     = {fallback=emojifallback}
        ]

        % ============================================================
        % TYPOGRAPHY POLISH
        % ============================================================
        \usepackage{microtype}          % better justification, reduces hyphenation
        \widowpenalty=10000             % prevent single lines stranded at top of page
        \clubpenalty=10000              % prevent single lines stranded at bottom of page
        \setlength{\parskip}{0.5\baselineskip}  % breathing room between paragraphs

        % ============================================================
        % HEADERS AND FOOTERS
        % ============================================================
        \usepackage[automark]{scrlayer-scrpage}
        \pagestyle{scrheadings}
        \clearpairofpagestyles
        \setkomafont{pageheadfoot}{\small\normalfont\itshape\textcolor{SecondaryColor}}
        \setkomafont{pagenumber}{\small\normalfont\itshape\textcolor{SecondaryColor}}
        \renewcommand{\sectionmark}[1]{\markboth{#1}{#1}}
        \renewcommand{\subsectionmark}[1]{}
        \lehead{\leftmark}
        \rohead{\rightmark}
        \lefoot{\pagemark}
        \rofoot{\pagemark}
        \setlength{\headheight}{12pt}
        \setlength{\headsep}{14pt}

        % ============================================================
        % FRONT MATTER PAGE NUMBERING
        % ============================================================
        % Roman numerals for TOC and any front matter before main content.
        % Switch to arabic in the QMD body using \pagenumbering{arabic}
        % at the start of the first real section.
        \pagenumbering{roman}

        % ============================================================
        % TABLES
        % ============================================================
        \usepackage{booktabs}
        \renewcommand{\arraystretch}{1.1}   % slightly more row padding

        % ============================================================
        % TABLE OF CONTENTS FORMATTING
        % ============================================================
        \usepackage{tocloft}
        \setlength{\cftbeforesecskip}{2pt}  % tighter spacing between TOC entries

        % ============================================================
        % HEADINGS
        % ============================================================
        \usepackage{titlesec}

        % Level 1 — Deep navy (matches PrimaryColor)
        \titleformat{\section}
          {\SansFont\Large\bfseries\color{Heading1}}
          {\thesection}{1em}{}

        % Level 2 — Steel blue
        \titleformat{\subsection}
          {\SansFont\large\bfseries\color{Heading2}}
          {\thesubsection}{1em}{}

        % Level 3 — Teal
        \titleformat{\subsubsection}
          {\SansFont\normalsize\bfseries\color{Heading3}}
          {\thesubsubsection}{1em}{}

        % Level 4 — Deep green
        \titleformat{\paragraph}
          {\SansFont\normalsize\bfseries\color{Heading4}}
          {\theparagraph}{1em}{}

        % ============================================================
        % SUPPLEMENTARY PACKAGES
        % ============================================================
        \usepackage{graphicx}    % image support (used in title page)
        \usepackage{pdflscape}   % landscape pages for wide appendix tables


    # title page
    include-before-body:
      text: |
        \makeatletter
        \begin{titlepage}
        \centering

        % Push title down from top of page
        \vspace*{3cm}

        % Title
        {\Huge\SansFontBold\textcolor{PrimaryColor}{\MakeUppercase{\@title}}\par}
        \vspace{0.6em}

        % Subtitle
        {\large\SansFontLight\textcolor{SecondaryColor}{\@subtitle}\par}
        \vspace{0.8em}

        % Description line
        {\normalsize\scshape A Guide for Senior Leaders, Conduct Professionals, and Data Partners\par}

        \vspace{5cm}

        % Author block
        {\Large Joshua L. Moermond\par}
        \vspace{0.35em}
        {\normalsize Assistant Director for Residential Conduct and Assessment\par}
        {\normalsize Student Conduct and Community Standards\par}
        {\normalsize University of Cincinnati\par}
        \vspace{1.25em}

        % Date
        {\normalsize Last updated: \@date\par}

        \end{titlepage}
        \clearpage

        % ============================================================
        % COPYRIGHT / LICENSE VERSO PAGE
        % ============================================================
        \thispagestyle{empty}
        \vspace*{\fill}
        {\small
        \noindent © 2026 Joshua L. Moermond.\par
        \vspace{0.8em}
        \noindent This work is shared under the \textbf{Creative Commons Attribution–NonCommercial 4.0 International (CC BY-NC 4.0)} license.\par
        \vspace{0.8em}
        \noindent \textbf{Under this license, you are free to:}\par
        \vspace{0.3em}
        \noindent \textbf{Share:} copy and redistribute the material in any medium or format\par
        \noindent \textbf{Adapt:} remix, transform, and build upon the material for non-commercial purposes, including educational, institutional, and professional practice use\par
        \vspace{0.8em}
        \noindent \textbf{Under the following conditions:}\par
        \vspace{0.3em}
        \noindent \textbf{Attribution:} You must give appropriate credit, provide a link to the license, and indicate if changes were made. Attribution must not suggest that the author or institution endorses you or your use.\par
        \vspace{0.3em}
        \noindent \textbf{Non-Commercial:} You may not use this material for commercial purposes, including use in for-profit products, services, or consulting engagements, without explicit permission from the author.\par
        \vspace{0.8em}
        \noindent \textbf{Recommended citation:}\par
        \noindent Moermond, J. L. (2026). \textit{Building an Assessment-Ready Conduct Data Model: Transforming Maxient Exports into Reliable Dashboards for Student Conduct Analysis.}\par
        \vspace{0.8em}
        \noindent \textbf{Intended Use:}\par
        \noindent This work is intended to support professional practice, assessment, and institutional learning in student conduct and student affairs contexts. Institutions are encouraged to adapt the approach to their own data structures, policies, and governance requirements. Reuse of this work should preserve its assessment-oriented intent and respect applicable ethical, legal, and student privacy standards.\par
        }
        \vspace*{\fill}
        \clearpage

        \cleardoublepage
        \makeatother

    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: true
    number-depth: 4
    link-citations: true
    colorlinks: true
    code-block-bg: '#F7F7F7'
    code-block-font-size: small
    geometry:
      - top=1.25in
      - bottom=1.25in
      - left=1.25in
      - right=1.25in

  html:
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    number-sections: true
    number-depth: 4
    theme: cosmo
    code-fold: true
    code-summary: "Show code"
    code-block-bg: '#F7F7F7'
    link-citations: true
    anchor-sections: true
    smooth-scroll: true
    title-block-banner: "#0D0887"
    title-block-banner-color: white
    format-links: false
    shift-heading-level-by: 1
    include-in-header:
      text: |
        <style>
          .skip-link{
            position:absolute; left:-999px; top:auto; width:1px; height:1px; overflow:hidden;
          }
          .skip-link:focus{
            position:fixed; left:1rem; top:1rem; width:auto; height:auto; padding:.5rem .75rem;
            background:#fff; border:2px solid #000; z-index:9999;
          }
        </style>
        <a class="skip-link" href="#quarto-content">Skip to main content</a>

citeproc: true
nocite: "@*"
bibliography: star_schema.bib
